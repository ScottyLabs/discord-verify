[project]
name = "discord-verify"
revision = "1.0"

[profiles.dev]
DISCORD_TOKEN = { description = "Discord bot token from the Developer Portal Bot tab" }
KEYCLOAK_URL = { description = "Keycloak base URL" }
KEYCLOAK_REALM = { description = "Keycloak realm name" }
OIDC_CLIENT_ID = { description = "OIDC client ID for the web verification flow", default = "discord-verify" }
OIDC_CLIENT_SECRET = { description = "OIDC client secret for the web verification flow", required = true }
KEYCLOAK_ADMIN_CLIENT_ID = { description = "Keycloak Admin API service account client ID" }
KEYCLOAK_ADMIN_CLIENT_SECRET = { description = "Keycloak Admin API service account client secret" }
APP_URL = { description = "Public URL for OIDC redirects (e.g. http://localhost:3000 for local dev)" }
RUST_LOG = { description = "Logging filter", required = false }

[profiles.prod]
DISCORD_TOKEN = { description = "Production Discord bot token" }
KEYCLOAK_URL = { description = "Production Keycloak base URL" }
KEYCLOAK_REALM = { description = "Production Keycloak realm name" }
OIDC_CLIENT_ID = { description = "Production OIDC client ID (managed by Kennel on deploy)" }
OIDC_CLIENT_SECRET = { description = "Production OIDC client secret (managed by Kennel on deploy)" }
KEYCLOAK_ADMIN_CLIENT_ID = { description = "Production Keycloak Admin API client ID" }
KEYCLOAK_ADMIN_CLIENT_SECRET = { description = "Production Keycloak Admin API client secret" }
APP_URL = { description = "Production public URL (https://verify.scottylabs.org)" }
RUST_LOG = { description = "Logging filter", required = false }

[profiles.staging]
DISCORD_TOKEN = { description = "Staging Discord bot token" }
KEYCLOAK_URL = { description = "Staging Keycloak base URL" }
KEYCLOAK_REALM = { description = "Staging Keycloak realm name" }
OIDC_CLIENT_ID = { description = "Staging OIDC client ID (managed by Kennel on deploy)" }
OIDC_CLIENT_SECRET = { description = "Staging OIDC client secret (managed by Kennel on deploy)" }
KEYCLOAK_ADMIN_CLIENT_ID = { description = "Staging Keycloak Admin API client ID" }
KEYCLOAK_ADMIN_CLIENT_SECRET = { description = "Staging Keycloak Admin API client secret" }
APP_URL = { description = "Staging public URL" }
RUST_LOG = { description = "Logging filter", required = false }

[profiles.preview]
DISCORD_TOKEN = { description = "PR preview Discord bot token", required = false }
KEYCLOAK_URL = { description = "PR preview Keycloak base URL", required = false }
KEYCLOAK_REALM = { description = "PR preview Keycloak realm name", required = false }
OIDC_CLIENT_ID = { description = "PR preview OIDC client ID (managed by Kennel on deploy)", required = false }
OIDC_CLIENT_SECRET = { description = "PR preview OIDC client secret (managed by Kennel on deploy)", required = false }
KEYCLOAK_ADMIN_CLIENT_ID = { description = "PR preview Keycloak Admin API client ID", required = false }
KEYCLOAK_ADMIN_CLIENT_SECRET = { description = "PR preview Keycloak Admin API client secret", required = false }
APP_URL = { description = "PR preview public URL", required = false }
RUST_LOG = { description = "Logging filter", required = false }
